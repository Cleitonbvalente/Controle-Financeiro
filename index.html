<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>Controle Financeiro</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<h1>Controle Financeiro</h1>

<section class="saldo">

<h2 id="saldo">Saldo: R$ 0</h2>

</section>

<section class="forms">

<div class="card">

<h3>Adicionar Receita</h3>

<input id="tituloReceita" placeholder="Título">

<input id="valorReceita" type="number" placeholder="Valor">

<input id="dataReceita" type="date">

<button id="btnReceita">Adicionar Receita</button>

</div>

<div class="card">

<h3>Adicionar Despesa</h3>

<input id="tituloDespesa" placeholder="Título">

<input id="valorDespesa" type="number" placeholder="Valor">

<input id="categoriaDespesa" placeholder="Categoria">

<input id="dataDespesa" type="date">

<button id="btnDespesa">Adicionar Despesa</button>

</div>

</section>

<section>

<h3>Filtrar por mês</h3>

<input type="month" id="mesFiltro">

</section>

<section class="listas">

<div>

<h2>Receitas</h2>

<ul id="listaReceitas"></ul>

</div>

<div>

<h2>Despesas</h2>

<ul id="listaDespesas"></ul>

</div>

</section>

<script type="module" src="js/app.js"></script>

</body>
</html>
